name: poker-next-gen

services:
  postgres:
    image: postgres:16-alpine
    container_name: poker-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - poker-net

  engine-math:
    build:
      context: ./engine-math
      dockerfile: Dockerfile
    container_name: poker-engine-math
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - poker-net

  backend-core:
    build:
      context: ./backend-core
      dockerfile: Dockerfile
    container_name: poker-backend-core
    depends_on:
      postgres:
        condition: service_healthy
      engine-math:
        condition: service_healthy
    environment:
      DATABASE_ADDRESS: postgres:localdb@postgres:5432/nakama
      NAKAMA_LOG_LEVEL: INFO
      ENGINE_MATH_URL: http://engine-math:8080
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    restart: unless-stopped
    networks:
      - poker-net

  frontend-table:
    image: node:22-alpine
    container_name: poker-frontend-table
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    environment:
      NEXT_PUBLIC_NAKAMA_HOST: http://localhost:7350
      NAKAMA_HOST: http://backend-core:7350
      NAKAMA_SERVER_KEY: defaultkey
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    volumes:
      - ./frontend-table:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend-core
    networks:
      - poker-net

networks:
  poker-net:
    driver: bridge

volumes:
  postgres-data:
