name: poker-next-gen

# Local, multi-container development topology.
#
#   frontend-table (Next.js) ──▶ backend-core (Nakama) ──▶ postgres
#
# All services share the `poker-net` bridge network so they can reach each
# other by service name. Production deploys use the per-service railway.toml
# files instead of this compose file.

services:
  postgres:
    image: postgres:16-alpine
    container_name: poker-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - poker-net

  backend-core:
    build:
      context: ./backend-core
      dockerfile: Dockerfile
    container_name: poker-backend-core
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # user:password@host:port/dbname — points at the postgres service above.
      DATABASE_ADDRESS: postgres:localdb@postgres:5432/nakama
      NAKAMA_LOG_LEVEL: INFO
    ports:
      - "7349:7349" # gRPC API
      - "7350:7350" # HTTP API + socket
      - "7351:7351" # Nakama Console
    restart: unless-stopped
    networks:
      - poker-net

  frontend-table:
    image: node:22-alpine
    container_name: poker-frontend-table
    working_dir: /app
    # Install deps against the mounted source, then run the Next.js dev server
    # bound to all interfaces so it is reachable from the host.
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    environment:
      NEXT_PUBLIC_NAKAMA_HOST: http://localhost:7350
      NAKAMA_HOST: http://backend-core:7350
      NAKAMA_SERVER_KEY: defaultkey
    volumes:
      - ./frontend-table:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend-core
    networks:
      - poker-net

networks:
  poker-net:
    driver: bridge

volumes:
  postgres-data:
